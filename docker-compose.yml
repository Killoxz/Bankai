services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anizu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/anizu?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-secret-change-me}
      AUTH_TRUST_HOST: "true"
      DATA_PROVIDER: ${DATA_PROVIDER:-mock}
      NEXT_PUBLIC_DATA_PROVIDER: ${NEXT_PUBLIC_DATA_PROVIDER:-mock}
    ports:
      - "3000:3000"

volumes:
  pgdata:
